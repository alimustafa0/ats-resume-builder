{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ATS Resume Builder{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body hx-boost="true">
    <header>
        <div class="container">
            <a class="brand" href="{% url 'core:home' %}">ATS Resume Builder</a>
            <nav>
                <a href="{% url 'core:home' %}">Home</a>
                <a href="{% url 'resumes:upload' %}">Resume</a>
                <a href="{% url 'jobs:new' %}">Job posting</a>
                <a href="{% url 'matching:match' %}">Match</a>
                {% if user.is_authenticated %}
                    <form method="post" action="{% url 'accounts:logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="navbtn">Log out</button>
                    </form>
                {% else %}
                    <a href="{% url 'accounts:login' %}">Log in</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
