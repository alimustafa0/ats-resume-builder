{% extends "base.html" %}

{% block title %}Log in - ATS Resume Builder{% endblock %}

{% block content %}
<div class="card" style="max-width:420px;margin:0 auto;">
    <h1>Log in</h1>
    {% if form.errors %}<p style="color:#b91c1c;">Email or password is incorrect.</p>{% endif %}
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom:14px;">
            <label>{{ form.username.label }}</label>{{ form.username }}
        </div>
        <div style="margin-bottom:18px;">
            <label>{{ form.password.label }}</label>{{ form.password }}
        </div>
        <button class="btn" type="submit">Log in</button>
    </form>
    <p style="margin-top:16px;font-size:14px;">No account? <a href="{% url 'accounts:signup' %}">Sign up</a>.</p>
</div>
{% endblock %}
